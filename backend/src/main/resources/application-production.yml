# ============================================
# Production Profile Configuration
# Activated with SPRING_PROFILES_ACTIVE=production
# ============================================

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

logging:
  level:
    root: WARN
    com.smartdocchat: INFO
    org.springframework: WARN
    org.hibernate: WARN
