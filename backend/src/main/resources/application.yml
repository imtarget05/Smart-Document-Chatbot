spring:
  application:
    name: smart-doc-chatbot
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  datasource:
    # Local dev:  jdbc:postgresql://localhost:5432/smart_doc_chatbot
    # Neon prod:  ${NEON_DATABASE_URL} (already contains user/pass/sslmode)
    url: ${SPRING_DATASOURCE_URL:${NEON_DATABASE_URL:jdbc:postgresql://localhost:5432/smart_doc_chatbot}}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: 2
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    baseline-on-migrate: true
    locations: classpath:db/migration
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
  shutdown: graceful

# Authentication and internal service authorization.
# Production profiles validate that these values have been explicitly replaced.
jwt:
  secret: ${JWT_SECRET:VGhpcy1pcy1hLWxvY2FsLWRldmVsb3BtZW50LWp3dC1zZWNyZXQtMzItYnl0ZXMh}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}
service:
  internal-token: ${INTERNAL_SERVICE_TOKEN:local-development-service-token-change-me}

# CORS Configuration
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080,http://127.0.0.1:3000}

# Ollama-compatible router handles chat; embeddings are proxied to local Ollama.
llm:
  base-url: ${LLM_BASE_URL:http://localhost:8001}
  chat-model: ${LLM_CHAT_MODEL:llama3.2:3b}
  embedding-model: ${LLM_EMBEDDING_MODEL:nomic-embed-text}
  temperature: ${LLM_TEMPERATURE:0.3}
  max-attempts: ${LLM_MAX_ATTEMPTS:3}
  retry-backoff-ms: ${LLM_RETRY_BACKOFF_MS:250}

# Qdrant Configuration
# Local dev:  host=localhost port=6333
# Qdrant Cloud: host=<cluster-id>.us-east-1-0.aws.cloud.qdrant.io  port=6333  use-https=true
qdrant:
  host: ${QDRANT_HOST:localhost}
  port: ${QDRANT_PORT:6333}
  use-https: ${QDRANT_USE_HTTPS:false}
  collection-name: ${QDRANT_COLLECTION:documents}
  api-key: ${QDRANT_API_KEY:}

# Airflow ETL Configuration
airflow:
  enabled: ${AIRFLOW_ENABLED:false}
  url: ${AIRFLOW_URL:http://airflow:8080/api/v1}
  username: ${AIRFLOW_USERNAME:admin}
  password: ${AIRFLOW_PASSWORD:admin}

# Python Agent Service (LangGraph multi-agent orchestration)
agent:
  service:
    url: ${AGENT_SERVICE_URL:http://localhost:9000}
external-services:
  connect-timeout-ms: ${EXTERNAL_CONNECT_TIMEOUT_MS:3000}
  read-timeout-ms: ${EXTERNAL_READ_TIMEOUT_MS:60000}

# Actuator & Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: smart-doc-chatbot
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.10}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}

# Logging is emitted as JSON by logback-spring.xml.
logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    com.smartdocchat: ${LOGGING_LEVEL_COM_SMARTDOCCHAT:DEBUG}
  file:
    name: ${LOG_FILE:logs/application.log}
    max-size: 10MB
    max-history: 30

# Supabase Storage Configuration
# Free tier: 1GB, long-term, no expiry
storage:
  provider: ${STORAGE_PROVIDER:local}   # local | supabase
  supabase:
    url: ${SUPABASE_URL:}
    bucket: ${SUPABASE_BUCKET:documents}
    # Service role key (found in Supabase project settings → API)
    service-key: ${SUPABASE_SERVICE_KEY:}
  local:
    upload-dir: ${LOCAL_UPLOAD_DIR:uploads}

# Graceful shutdown is configured under spring.lifecycle above
