spring:
  application:
    name: smart-doc-chatbot
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/smart_doc_chatbot}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: 2
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    baseline-on-migrate: true
    locations: classpath:db/migration
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
  shutdown: graceful

# CORS Configuration
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080,http://127.0.0.1:3000}

# Gemini Configuration
gemini:
  api-key: ${GEMINI_API_KEY:your-api-key-here}
  model: ${GEMINI_MODEL:gemini-2.0-flash}
  embedding-model: ${GEMINI_EMBEDDING_MODEL:text-embedding-004}
  temperature: ${GEMINI_TEMPERATURE:0.7}

# Qdrant Configuration
qdrant:
  host: ${QDRANT_HOST:localhost}
  port: ${QDRANT_PORT:6333}
  collection-name: ${QDRANT_COLLECTION:documents}
  api-key: ${QDRANT_API_KEY:}

# Actuator & Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: smart-doc-chatbot
    export:
      prometheus:
        enabled: true

# Logging
logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    com.smartdocchat: ${LOGGING_LEVEL_COM_SMARTDOCCHAT:DEBUG}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:logs/application.log}
    max-size: 10MB
    max-history: 30

# Graceful shutdown is configured under spring.lifecycle above
