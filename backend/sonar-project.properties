# SonarQube configuration for Backend
sonar.projectKey=imtarget05_Smart-Document-Chatbot
sonar.projectName=Smart Doc Chatbot - Backend
sonar.projectVersion=1.0.0

sonar.sources=src/main/java
sonar.java.binaries=target/classes

sonar.java.coveragePlugin=jacoco
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

sonar.sourceEncoding=UTF-8
sonar.java.source=17

# Exclusions
sonar.exclusions=**/dto/**,**/entity/**,**/config/**
sonar.coverage.exclusions=**/dto/**,**/entity/**,**/config/**,**/*Application.java
