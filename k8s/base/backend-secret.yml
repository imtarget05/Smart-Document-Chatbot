# NOTE: In production, use Sealed Secrets or External Secrets Operator.
# This file is a TEMPLATE. Never commit real secrets.
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  labels:
    app: backend
type: Opaque
stringData:
  # ── Neon PostgreSQL (free 512MB, long-term) ──────────────────────────────────
  # Full connection string from neon.tech → project → connection string
  SPRING_DATASOURCE_URL: "postgresql://CHANGE_ME@ep-xxx.aws.neon.tech/neondb?sslmode=require"

  # ── Qdrant Cloud (free 1GB, long-term) ──────────────────────────────────────
  # From cloud.qdrant.io → cluster details
  QDRANT_HOST: "CHANGE_ME.aws.cloud.qdrant.io"
  QDRANT_API_KEY: "CHANGE_ME_QDRANT_API_KEY"

  # ── Supabase Storage (free 1GB, long-term) ───────────────────────────────────
  # From supabase.com → project settings → API
  SUPABASE_URL: "https://CHANGE_ME.supabase.co"
  SUPABASE_SERVICE_KEY: "CHANGE_ME_SERVICE_ROLE_KEY"

  # ── Auth ─────────────────────────────────────────────────────────────────────
  JWT_SECRET: "CHANGE_ME_BASE64_32_BYTE_SECRET"
  INTERNAL_SERVICE_TOKEN: "CHANGE_ME_RANDOM_INTERNAL_TOKEN"
  AIRFLOW_USERNAME: "admin"
  AIRFLOW_PASSWORD: "CHANGE_ME"
