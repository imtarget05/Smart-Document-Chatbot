# ============================================================================
# Backend Secrets Template
# ============================================================================
# IMPORTANT: This file is a TEMPLATE only. It contains NO real secrets.
# In production, use one of:
#   1. Sealed Secrets (bitnami/sealed-secrets) — encrypts secrets at rest in Git
#   2. External Secrets Operator — syncs from AWS Secrets Manager / Vault / GCP SM
#   3. HashiCorp Vault with CSI provider
#
# NEVER commit real secret values. The placeholders below are intentionally
# invalid so that a misconfigured deploy fails fast rather than running with
# weak credentials.
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  labels:
    app: backend
type: Opaque
# NOTE: Use `stringData` only for templating. In real deployments prefer `data`
# with base64-encoded values managed by Sealed Secrets / External Secrets.
stringData:
  # ── Neon PostgreSQL (free 512MB, long-term) ──────────────────────────────────
  # Full connection string from neon.tech → project → connection string
  # PLACEHOLDER: Replace via External Secrets / Sealed Secret before applying.
  SPRING_DATASOURCE_URL: "REPLACE_VIA_SEALED_SECRET_OR_EXTERNAL_SECRET"

  # ── Qdrant Cloud (free 1GB, long-term) ──────────────────────────────────────
  # From cloud.qdrant.io → cluster details
  QDRANT_HOST: "REPLACE_VIA_SEALED_SECRET_OR_EXTERNAL_SECRET"
  QDRANT_API_KEY: "REPLACE_VIA_SEALED_SECRET_OR_EXTERNAL_SECRET"

  # ── Supabase Storage (free 1GB, long-term) ───────────────────────────────────
  # From supabase.com → project settings → API
  SUPABASE_URL: "REPLACE_VIA_SEALED_SECRET_OR_EXTERNAL_SECRET"
  SUPABASE_SERVICE_KEY: "REPLACE_VIA_SEALED_SECRET_OR_EXTERNAL_SECRET"

  # ── Auth ─────────────────────────────────────────────────────────────────────
  # JWT secret must be a cryptographically random base64 string of >= 32 bytes.
  # Generate with: openssl rand -base64 48
  JWT_SECRET: "REPLACE_VIA_SEALED_SECRET_OR_EXTERNAL_SECRET"
  INTERNAL_SERVICE_TOKEN: "REPLACE_VIA_SEALED_SECRET_OR_EXTERNAL_SECRET"
  # Airflow: change the default admin password. Generate with: openssl rand -base64 24
  AIRFLOW_USERNAME: "REPLACE_VIA_SEALED_SECRET_OR_EXTERNAL_SECRET"
  AIRFLOW_PASSWORD: "REPLACE_VIA_SEALED_SECRET_OR_EXTERNAL_SECRET"