# ============================================
# PostgreSQL: Neon Serverless (free 512MB, long-term)
# No StatefulSet needed — data lives in Neon cloud.
# Backend connects via SPRING_DATASOURCE_URL (stored in backend-secrets).
# ============================================
#
# This file intentionally does NOT define a postgres StatefulSet.
# If you want to revert to self-hosted Postgres (not recommended for production),
# restore the StatefulSet from git history.
#
# The postgres-secrets Secret below is kept for reference — the actual
# credential is embedded in the SPRING_DATASOURCE_URL connection string.
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
type: Opaque
stringData:
  # These values are embedded in SPRING_DATASOURCE_URL (Neon connection string).
  # Kept here as documentation only.
  POSTGRES_USER: "neondb_owner"
  POSTGRES_PASSWORD: "CHANGE_ME_USE_NEON_URL_INSTEAD"
