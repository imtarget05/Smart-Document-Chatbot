# ============================================================================
# External Secrets Operator (ESO) manifests
# Replace plaintext Secrets with ExternalSecret references.
# Pre-requisites: ESO installed + SecretStore/ClusterSecretStore configured.
# ============================================================================
---
# Example ClusterSecretStore (configure once per cluster)
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "https://vault.internal:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "external-secrets"
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
# Backend secrets – pulled from Vault/AWS SM instead of committed plaintext
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backend-secrets
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: backend-secrets
    creationPolicy: Owner
  data:
    - secretKey: SPRING_DATASOURCE_PASSWORD
      remoteRef:
        key: smart-doc-chatbot/backend
        property: db_password
    - secretKey: JWT_SECRET
      remoteRef:
        key: smart-doc-chatbot/backend
        property: jwt_secret
    - secretKey: INTERNAL_SERVICE_TOKEN
      remoteRef:
        key: smart-doc-chatbot/backend
        property: internal_service_token
    - secretKey: QDRANT_API_KEY
      remoteRef:
        key: smart-doc-chatbot/backend
        property: qdrant_api_key
---
# LLM Router secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: llm-router-secrets
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: llm-router-secrets
    creationPolicy: Owner
  data:
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: smart-doc-chatbot/llm-router
        property: anthropic_api_key
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: smart-doc-chatbot/llm-router
        property: openai_api_key
    - secretKey: OPENROUTER_API_KEY
      remoteRef:
        key: smart-doc-chatbot/llm-router
        property: openrouter_api_key
    - secretKey: ROUTER_INTERNAL_TOKEN
      remoteRef:
        key: smart-doc-chatbot/llm-router
        property: internal_token
