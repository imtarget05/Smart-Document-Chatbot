apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-router-config
  labels:
    app: llm-router
data:
  LOCAL_LLM_BASE_URL: "http://llm:11434"
  LOCAL_LLM_MODEL: "llama3.2:3b"
  LOCAL_LLM_TIMEOUT_SECONDS: "3"
  ROUTER_CONFIDENCE_THRESHOLD: "0.7"
  ANTHROPIC_MODEL: "claude-sonnet-4-20250514"
  OPENAI_VISION_MODEL: "gpt-4o"
---
# Template only. Replace with Sealed Secrets or External Secrets in production.
apiVersion: v1
kind: Secret
metadata:
  name: llm-router-secrets
  labels:
    app: llm-router
type: Opaque
stringData:
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-router
  labels:
    app: llm-router
    app.kubernetes.io/name: llm-router
    app.kubernetes.io/component: ai-routing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: llm-router
  template:
    metadata:
      labels:
        app: llm-router
        app.kubernetes.io/name: llm-router
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
      containers:
        - name: llm-router
          image: ghcr.io/OWNER/smart-doc-chatbot/llm-router:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: llm-router-config
            - secretRef:
                name: llm-router-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: llm-router
  labels:
    app: llm-router
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: http
  selector:
    app: llm-router
