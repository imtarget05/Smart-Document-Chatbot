# ============================================
# Qdrant: managed by Qdrant Cloud (free 1GB cluster, long-term)
# No StatefulSet needed — data lives in Qdrant Cloud.
# Backend connects via QDRANT_HOST / QDRANT_API_KEY / QDRANT_USE_HTTPS env vars.
#
# To provision Qdrant Cloud:
#   1. Register at https://cloud.qdrant.io
#   2. Create a free cluster (1 GB)
#   3. Copy the cluster hostname and API key
#   4. Set in backend-secrets:
#        QDRANT_HOST: <cluster-id>.us-east-1-0.aws.cloud.qdrant.io
#        QDRANT_API_KEY: <your-api-key>
#        QDRANT_USE_HTTPS: "true"
# ============================================
#
# This file intentionally does NOT define a Qdrant StatefulSet.
# If you want to revert to self-hosted Qdrant, restore from git history.
