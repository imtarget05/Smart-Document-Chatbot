apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  labels:
    app: backend
data:
  SPRING_PROFILES_ACTIVE: "production"
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/smart_doc_chatbot"
  SPRING_JPA_HIBERNATE_DDL_AUTO: "validate"
  FLYWAY_ENABLED: "true"
  QDRANT_HOST: "qdrant"
  QDRANT_PORT: "6333"
  QDRANT_COLLECTION: "documents"
  LLM_BASE_URL: "http://llm:11434"
  LLM_CHAT_MODEL: "deepseek-r1:1.5b"
  LLM_EMBEDDING_MODEL: "nomic-embed-text"
  LLM_TEMPERATURE: "0.3"
  CORS_ALLOWED_ORIGINS: "https://CHANGE_ME_FRONTEND_HOST"
  LOGGING_LEVEL_ROOT: "WARN"
  LOGGING_LEVEL_COM_SMARTDOCCHAT: "INFO"
  JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC"
