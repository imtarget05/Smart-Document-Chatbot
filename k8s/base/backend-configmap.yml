apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  labels:
    app: backend
data:
  SPRING_PROFILES_ACTIVE: "production"
  # PostgreSQL → Neon (URL in backend-secrets as SPRING_DATASOURCE_URL)
  SPRING_JPA_HIBERNATE_DDL_AUTO: "validate"
  FLYWAY_ENABLED: "true"
  # Qdrant Cloud (host/key in backend-secrets)
  QDRANT_PORT: "6333"
  QDRANT_USE_HTTPS: "true"
  QDRANT_COLLECTION: "documents"
  # Supabase Storage
  STORAGE_PROVIDER: "supabase"
  SUPABASE_BUCKET: "documents"
  # LLM Router
  LLM_BASE_URL: "http://llm-router:8000"
  LLM_CHAT_MODEL: "llama3.2:3b"
  LLM_EMBEDDING_MODEL: "nomic-embed-text"
  LLM_TEMPERATURE: "0.3"
  CORS_ALLOWED_ORIGINS: "https://CHANGE_ME_FRONTEND_HOST"
  LOGGING_LEVEL_ROOT: "WARN"
  LOGGING_LEVEL_COM_SMARTDOCCHAT: "INFO"
  JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC"
