apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: smart-doc-chatbot-staging
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: smart-doc-chatbot
    environment: staging
  annotations:
    # Notifications
    notifications.argoproj.io/subscribe.on-sync-succeeded.slack: devops-alerts
    notifications.argoproj.io/subscribe.on-sync-failed.slack: devops-alerts
    notifications.argoproj.io/subscribe.on-health-degraded.slack: devops-alerts
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: smart-doc-chatbot

  source:
    repoURL: https://github.com/OWNER/smart-doc-chatbot.git
    targetRevision: main
    path: k8s/overlays/staging

  destination:
    server: https://kubernetes.default.svc
    namespace: smart-doc-chatbot-staging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # Health checks for custom resources
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas  # Ignore HPA-managed replica count

  revisionHistoryLimit: 10
