global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'smart-doc-chatbot-backend'
    metrics_path: '/api/actuator/prometheus'
    authorization:
      type: Bearer
      credentials: local-development-service-token-change-me
    static_configs:
      - targets: ['backend:8080']
