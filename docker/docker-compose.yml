# ============================================
# Smart Document Chatbot - Production Docker Compose
# Usage: docker compose -f docker/docker-compose.yml up -d
# ============================================

services:
  # --- PostgreSQL Database ---
  postgres:
    image: postgres:15-alpine
    container_name: smart-document-chatbox-postgres
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smart_doc_chatbot}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-smart_doc_chatbot}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # --- Qdrant Vector Database ---
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: smart-document-chatbox-qdrant
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-qdrant_key_123}
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'

  # --- Local LLM & Embedding Engine (DeepSeek) ---
  llm:
    image: ollama/ollama:latest
    container_name: smart-document-chatbox-llm
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - app-network

  # --- Automated DeepSeek Model Puller ---
  llm-model-puller:
    image: curlimages/curl:latest
    container_name: smart-document-chatbox-llm-puller
    depends_on:
      - llm
    networks:
      - app-network
    entrypoint: [ "sh", "-c", "until curl -s http://llm:11434/api/tags >/dev/null; do sleep 2; done; echo 'Pulling DeepSeek-R1...'; curl -d '{\"name\": \"deepseek-r1:1.5b\"}' http://llm:11434/api/pull; echo 'Pulling nomic-embed-text...'; curl -d '{\"name\": \"nomic-embed-text\"}' http://llm:11434/api/pull; echo 'All local models pulled successfully!'" ]

  # --- Smart Document API (Spring Boot Backend) ---
  smart-document:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    image: smart-document:latest
    container_name: smart-document-chatbox-backend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      # Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-smart_doc_chatbot}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      # Qdrant
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-qdrant_key_123}
      # Local LLM models & embeddings; no AI provider API key is used.
      LLM_BASE_URL: ${LLM_BASE_URL:-http://llm:11434}
      LLM_CHAT_MODEL: ${LLM_CHAT_MODEL:-deepseek-r1:1.5b}
      LLM_EMBEDDING_MODEL: ${LLM_EMBEDDING_MODEL:-nomic-embed-text}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.3}
      # JVM
      JAVA_OPTS: "${JAVA_OPTS:--XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0}"
      # Spring profile
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      JWT_SECRET: ${JWT_SECRET:-NuPA39HyyLKexZXkcFoNHahCa4kPNVefY8lr5/e/kM8=}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-afa42215985ef50921fecbf8d9d15fa6c04fa6333bdec606556e06d56aecc96b}
      AIRFLOW_USERNAME: ${AIRFLOW_USERNAME:-admin}
      AIRFLOW_PASSWORD: ${AIRFLOW_PASSWORD:-admin}
      AGENT_SERVICE_URL: ${AGENT_SERVICE_URL:-http://agent:9000}
      # Logging
      LOGGING_LEVEL_ROOT: ${LOGGING_LEVEL_ROOT:-INFO}
      LOGGING_LEVEL_COM_SMARTDOCCHAT: ${LOGGING_LEVEL_COM_SMARTDOCCHAT:-DEBUG}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      llm:
        condition: service_started
    volumes:
      - uploads_data:/app/uploads
    networks:
      app-network:
        aliases:
          - backend
          - smart-document
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  # --- React Frontend (Nginx) ---
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: smart-document-chatbox-frontend
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      smart-document:
        condition: service_healthy
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

  # --- Prometheus (Monitoring) ---
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: smart-document-chatbox-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - app-network
    depends_on:
      smart-document:
        condition: service_healthy

  # --- Grafana (Dashboard) ---
  grafana:
    image: grafana/grafana:10.0.3
    container_name: smart-document-chatbox-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - app-network
    depends_on:
      - prometheus

  # --- AI Agent Automation Service (LangGraph multi-agent orchestration) ---
  agent:
    build:
      context: ../agent
      dockerfile: Dockerfile
    image: smart-doc-agent:latest
    container_name: smart-document-chatbox-agent
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-afa42215985ef50921fecbf8d9d15fa6c04fa6333bdec606556e06d56aecc96b}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://llm:11434}
      LLM_CHAT_MODEL: ${LLM_CHAT_MODEL:-deepseek-r1:1.5b}
      LLM_EMBEDDING_MODEL: ${LLM_EMBEDDING_MODEL:-nomic-embed-text}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-qdrant_key_123}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-smart_doc_chatbot}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      JIRA_BASE_URL: ${JIRA_BASE_URL:-}
      JIRA_EMAIL: ${JIRA_EMAIL:-}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN:-}
      NOTION_API_TOKEN: ${NOTION_API_TOKEN:-}
      REPORT_OUTPUT_DIR: /app/reports
    ports:
      - "${AGENT_PORT:-9000}:9000"
    volumes:
      - agent_reports:/app/reports
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      llm:
        condition: service_started
    networks:
      app-network:
        aliases:
          - agent
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

volumes:
  postgres_data:
    driver: local
  qdrant_data:
    driver: local
  uploads_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  ollama_data:
    driver: local
  agent_reports:
    driver: local

networks:
  app-network:
    driver: bridge
