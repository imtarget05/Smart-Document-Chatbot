# ============================================
# Smart Document Chatbot - Production Docker Compose
# Usage: docker compose -f docker/docker-compose.yml up -d
#
# Data storage (all free-tier, long-term):
#   PostgreSQL  → Neon serverless  (set NEON_DATABASE_URL in .env)
#   Vector DB   → Qdrant Cloud     (set QDRANT_HOST / QDRANT_API_KEY / QDRANT_USE_HTTPS)
#   File uploads→ Supabase Storage (set SUPABASE_URL / SUPABASE_SERVICE_KEY)
# ============================================

services:

  # --- Local LLM & Embedding Engine ---
  llm:
    image: ollama/ollama:latest
    container_name: smart-document-chatbox-llm
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - app-network

  # --- Automated Local Model Puller ---
  llm-model-puller:
    image: curlimages/curl:latest
    container_name: smart-document-chatbox-llm-puller
    depends_on:
      - llm
    networks:
      - app-network
    entrypoint: [ "sh", "-c", "until curl -s http://llm:11434/api/tags >/dev/null; do sleep 2; done; echo 'Pulling Llama 3.2...'; curl -d '{\"name\": \"${ROUTER_LOCAL_MODEL:-llama3.2:3b}\"}' http://llm:11434/api/pull; echo 'Pulling nomic-embed-text...'; curl -d '{\"name\": \"nomic-embed-text\"}' http://llm:11434/api/pull; echo 'All local models pulled successfully!'" ]

  # --- LLM Router (local / Claude / GPT-4o Vision) ---
  llm-router:
    build:
      context: ../llm-router
      dockerfile: Dockerfile
    image: smart-doc-llm-router:latest
    container_name: smart-document-chatbox-llm-router
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      LOCAL_LLM_BASE_URL: http://llm:11434
      LOCAL_LLM_MODEL: ${ROUTER_LOCAL_MODEL:-llama3.2:3b}
      LOCAL_LLM_TIMEOUT_SECONDS: ${LOCAL_LLM_TIMEOUT_SECONDS:-180}
      ROUTER_CONFIDENCE_THRESHOLD: ${ROUTER_CONFIDENCE_THRESHOLD:-0.7}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_VISION_MODEL: ${OPENAI_VISION_MODEL:-gpt-4o}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      NVIDIA_MODEL_ID: ${NVIDIA_MODEL_ID:-}
      NVIDIA_API_URL: ${NVIDIA_API_URL:-}
    ports:
      - "${LLM_ROUTER_PORT:-8001}:8000"
    depends_on:
      llm:
        condition: service_started
    networks:
      app-network:
        aliases:
          - llm-router
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  # --- Smart Document API (Spring Boot Backend) ---
  smart-document:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    image: smart-document:latest
    container_name: smart-document-chatbox-backend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      # Database — Neon Serverless PostgreSQL (free 512MB)
      SPRING_DATASOURCE_URL: ${NEON_DATABASE_URL}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      # Qdrant Cloud (free 1GB)
      QDRANT_HOST: ${QDRANT_HOST}
      QDRANT_PORT: ${QDRANT_PORT:-6333}
      QDRANT_USE_HTTPS: ${QDRANT_USE_HTTPS:-false}
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      # Supabase Storage (free 1GB)
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}
      SUPABASE_BUCKET: ${SUPABASE_BUCKET:-documents}
      # CRAG uses the Ollama-compatible router for chat and embeddings.
      LLM_BASE_URL: http://llm-router:8000
      LLM_CHAT_MODEL: ${LLM_CHAT_MODEL:-llama3.2:3b}
      LLM_EMBEDDING_MODEL: ${LLM_EMBEDDING_MODEL:-nomic-embed-text}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.3}
      # JVM
      JAVA_OPTS: "${JAVA_OPTS:--XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0}"
      # Spring profile
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      JWT_SECRET: ${JWT_SECRET:-NuPA39HyyLKexZXkcFoNHahCa4kPNVefY8lr5/e/kM8=}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-afa42215985ef50921fecbf8d9d15fa6c04fa6333bdec606556e06d56aecc96b}
      AIRFLOW_USERNAME: ${AIRFLOW_USERNAME:-admin}
      AIRFLOW_PASSWORD: ${AIRFLOW_PASSWORD:-admin}
      AGENT_SERVICE_URL: ${AGENT_SERVICE_URL:-http://agent:9000}
      EXTERNAL_READ_TIMEOUT_MS: ${EXTERNAL_READ_TIMEOUT_MS:-180000}
      # Logging
      LOGGING_LEVEL_ROOT: ${LOGGING_LEVEL_ROOT:-INFO}
      LOGGING_LEVEL_COM_SMARTDOCCHAT: ${LOGGING_LEVEL_COM_SMARTDOCCHAT:-DEBUG}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    depends_on:
      llm:
        condition: service_started
      llm-router:
        condition: service_healthy
    networks:
      app-network:
        aliases:
          - backend
          - smart-document
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.5'

  # --- React Frontend (Nginx) ---
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: smart-document-chatbox-frontend
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      smart-document:
        condition: service_healthy
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

  # --- n8n (Workflow Automation) ---
  n8n:
    image: n8nio/n8n:latest
    container_name: smart-document-chatbox-n8n
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-admin}
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: n8n-postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${N8N_POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${N8N_POSTGRES_PASSWORD:-n8n}
      GENERIC_TIMEZONE: ${TZ:-UTC}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - n8n-postgres
    networks:
      app-network:
        aliases:
          - n8n

  n8n-postgres:
    image: postgres:16-alpine
    container_name: smart-document-chatbox-n8n-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${N8N_POSTGRES_DB:-n8n}
      POSTGRES_USER: ${N8N_POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${N8N_POSTGRES_PASSWORD:-n8n}
    volumes:
      - n8n_postgres_data:/var/lib/postgresql/data
    networks:
      app-network:
        aliases:
          - n8n-postgres

  # --- Prometheus (Monitoring) ---
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: smart-document-chatbox-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - app-network
    depends_on:
      smart-document:
        condition: service_healthy

  # --- Grafana (Dashboard) ---
  grafana:
    image: grafana/grafana:10.0.3
    container_name: smart-document-chatbox-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - app-network
    depends_on:
      - prometheus

  # --- AI Agent Automation Service (LangGraph multi-agent orchestration) ---
  agent:
    build:
      context: ../agent
      dockerfile: Dockerfile
    image: smart-doc-agent:latest
    container_name: smart-document-chatbox-agent
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-afa42215985ef50921fecbf8d9d15fa6c04fa6333bdec606556e06d56aecc96b}
      LLM_BASE_URL: http://llm-router:8000
      LLM_CHAT_MODEL: ${LLM_CHAT_MODEL:-llama3.2:3b}
      LLM_EMBEDDING_MODEL: ${LLM_EMBEDDING_MODEL:-nomic-embed-text}
      # Qdrant Cloud
      QDRANT_HOST: ${QDRANT_HOST}
      QDRANT_PORT: ${QDRANT_PORT:-6333}
      QDRANT_USE_HTTPS: ${QDRANT_USE_HTTPS:-false}
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      # Neon PostgreSQL (agent uses direct psycopg2 connection)
      POSTGRES_HOST: ${NEON_POSTGRES_HOST:-localhost}
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-neondb}
      POSTGRES_USER: ${POSTGRES_USER:-neondb_owner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      JIRA_BASE_URL: ${JIRA_BASE_URL:-}
      JIRA_EMAIL: ${JIRA_EMAIL:-}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN:-}
      NOTION_API_TOKEN: ${NOTION_API_TOKEN:-}
      REPORT_OUTPUT_DIR: /app/reports
    ports:
      - "${AGENT_PORT:-9000}:9000"
    volumes:
      - agent_reports:/app/reports
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      llm:
        condition: service_started
      llm-router:
        condition: service_healthy
    networks:
      app-network:
        aliases:
          - agent
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

volumes:
  ollama_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  agent_reports:
    driver: local
  n8n_data:
    driver: local

networks:
  app-network:
    driver: bridge
