# ============================================
# Smart Document Chatbot - Development Docker Compose
# Only starts infrastructure services (DB, Qdrant, local Ollama models)
# Backend & Frontend run locally for hot-reload
#
# Usage: docker compose -f docker/docker-compose.dev.yml up -d
# ============================================

services:
  # --- PostgreSQL Database ---
  postgres:
    image: postgres:15-alpine
    container_name: sdc-postgres-dev
    environment:
      POSTGRES_DB: smart_doc_chatbot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Qdrant Vector Database ---
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: sdc-qdrant-dev
    environment:
      QDRANT__SERVICE__API_KEY: "qdrant_key_123"
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_dev_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  llm:
    image: ollama/ollama:latest
    container_name: sdc-llm-dev
    ports:
      - "11434:11434"
    volumes:
      - ollama_dev_data:/root/.ollama

  llm-model-puller:
    image: curlimages/curl:latest
    container_name: sdc-llm-puller-dev
    depends_on:
      - llm
    entrypoint: [ "sh", "-c", "until curl -s http://llm:11434/api/tags >/dev/null; do sleep 2; done; curl -d '{\"name\": \"deepseek-r1:1.5b\"}' http://llm:11434/api/pull; curl -d '{\"name\": \"nomic-embed-text\"}' http://llm:11434/api/pull" ]

  # --- pgAdmin (Database Management UI) ---
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sdc-pgadmin-dev
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@smartdoc.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

volumes:
  postgres_dev_data:
    driver: local
  qdrant_dev_data:
    driver: local
  ollama_dev_data:
    driver: local
