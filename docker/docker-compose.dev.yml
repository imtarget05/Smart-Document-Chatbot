# ============================================
# Smart Document Chatbot - Development Docker Compose
# Only starts infrastructure services that still run locally in dev:
#   - Ollama (LLM + embeddings)
#   - llm-router
#   - Agent service (hot-reload)
#   - pgAdmin (optional, --profile tools)
#
# PostgreSQL → Neon Cloud (set NEON_DATABASE_URL in .env)
# Qdrant     → Qdrant Cloud (set QDRANT_HOST/API_KEY) OR local below
# Storage    → local disk (STORAGE_PROVIDER=local, default)
#
# Usage: docker compose -f docker/docker-compose.dev.yml up -d
# ============================================

services:

  # ── PostgreSQL (local dev option) ───────────────────────────────────────────
  # Comment this out if using Neon (set SPRING_DATASOURCE_URL in .env instead).
  postgres:
    image: postgres:15-alpine
    container_name: sdc-postgres-dev
    environment:
      POSTGRES_DB: smart_doc_chatbot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Qdrant (local dev option) ────────────────────────────────────────────────
  # Comment this out if using Qdrant Cloud (set QDRANT_HOST/etc. in .env).
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: sdc-qdrant-dev
    environment:
      QDRANT__SERVICE__API_KEY: "qdrant_key_123"
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_dev_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Ollama LLM Server ────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: sdc-ollama-dev
    ports:
      - "11434:11434"
    volumes:
      - ollama_dev_data:/root/.ollama
    environment:
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-1}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-2}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-5m}
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s
    restart: unless-stopped

  # ── Ollama Model Puller (one-shot) ───────────────────────────────────────────
  ollama-model-puller:
    image: curlimages/curl:latest
    container_name: sdc-ollama-puller-dev
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - |
        echo "Pulling chat model: ${OLLAMA_CHAT_MODEL:-llama3.2:3b} ..."
        curl -sf -X POST http://ollama:11434/api/pull \
          -H 'Content-Type: application/json' \
          -d "{\"name\": \"${OLLAMA_CHAT_MODEL:-llama3.2:3b}\"}"
        echo "Pulling embedding model: nomic-embed-text ..."
        curl -sf -X POST http://ollama:11434/api/pull \
          -H 'Content-Type: application/json' \
          -d '{"name": "nomic-embed-text"}'
        echo "All models ready."
    restart: "no"

  # ── LLM Router ──────────────────────────────────────────────────────────────
  llm-router:
    build:
      context: ../llm-router
      dockerfile: Dockerfile
    container_name: sdc-llm-router-dev
    environment:
      LOCAL_LLM_BASE_URL: http://ollama:11434
      LOCAL_LLM_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.2:3b}
      LOCAL_LLM_TIMEOUT_SECONDS: ${LOCAL_LLM_TIMEOUT_SECONDS:-3}
      ROUTER_CONFIDENCE_THRESHOLD: ${ROUTER_CONFIDENCE_THRESHOLD:-0.7}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_VISION_MODEL: ${OPENAI_VISION_MODEL:-gpt-4o}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      NVIDIA_MODEL_ID: ${NVIDIA_MODEL_ID:-}
      NVIDIA_API_URL: ${NVIDIA_API_URL:-}
    ports:
      - "${LLM_ROUTER_PORT:-8001}:8000"
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  # ── Python Agent Service (hot-reload) ───────────────────────────────────────
  agent:
    build:
      context: ../agent
      dockerfile: Dockerfile
    container_name: sdc-agent-dev
    environment:
      INTERNAL_SERVICE_TOKEN: local-development-service-token-change-me
      LLM_BASE_URL: http://llm-router:8000
      LLM_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.2:3b}
      LLM_EMBEDDING_MODEL: nomic-embed-text
      # Qdrant — points to local container by default
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_API_KEY: qdrant_key_123
      # PostgreSQL — points to local container by default
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: smart_doc_chatbot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      REPORT_OUTPUT_DIR: /app/reports
    ports:
      - "9000:9000"
    volumes:
      - ../agent:/app
      - agent_dev_reports:/app/reports
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      llm-router:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 9000 --reload
    restart: unless-stopped

  # ── n8n (workflow automation) ────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: sdc-n8n-dev
    environment:
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-admin}
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: n8n-postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${N8N_POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${N8N_POSTGRES_PASSWORD:-n8n}
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n_dev_data:/home/node/.n8n
    depends_on:
      - n8n-postgres
    restart: unless-stopped

  n8n-postgres:
    image: postgres:16-alpine
    container_name: sdc-n8n-postgres-dev
    environment:
      POSTGRES_DB: ${N8N_POSTGRES_DB:-n8n}
      POSTGRES_USER: ${N8N_POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${N8N_POSTGRES_PASSWORD:-n8n}
    volumes:
      - n8n_postgres_dev_data:/var/lib/postgresql/data
    restart: unless-stopped

  # ── pgAdmin (optional, activate with --profile tools) ───────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sdc-pgadmin-dev
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@smartdoc.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

# ── Named Volumes ────────────────────────────────────────────────────────────
volumes:
  postgres_dev_data:
    driver: local
  qdrant_dev_data:
    driver: local
  ollama_dev_data:
    driver: local
  agent_dev_reports:
    driver: local
  n8n_dev_data:
    driver: local
  n8n_postgres_dev_data:
    driver: local
