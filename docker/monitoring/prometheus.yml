# ============================================
# Prometheus Configuration
# ============================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - "alert-rules.yml"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Spring Boot Backend (via Actuator)
  - job_name: 'backend'
    metrics_path: '/api/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['backend:8080']
        labels:
          app: 'smart-doc-chatbot'
          component: 'backend'

  # Nginx Frontend
  - job_name: 'nginx'
    static_configs:
      - targets: ['frontend:80']
        labels:
          app: 'smart-doc-chatbot'
          component: 'frontend'

  # PostgreSQL (if postgres_exporter added)
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']

  # Qdrant
  - job_name: 'qdrant'
    static_configs:
      - targets: ['qdrant:6333']
        labels:
          app: 'smart-doc-chatbot'
          component: 'qdrant'
