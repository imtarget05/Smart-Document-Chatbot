# SonarQube configuration for Frontend
sonar.projectKey=smart-doc-chatbot-frontend
sonar.projectName=Smart Doc Chatbot - Frontend
sonar.projectVersion=1.0.0

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.js,**/*.test.jsx,**/*.spec.js,**/*.spec.jsx

sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/node_modules/**,**/build/**,**/coverage/**,**/*.test.js,**/*.test.jsx
sonar.coverage.exclusions=**/*.test.js,**/*.test.jsx,**/index.jsx
