# ============================================
# CI Pipeline - Build, Test, Scan, Analyze
# Triggers: push to main/develop, all PRs
# ============================================

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '18'
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write
  security-events: write
  pull-requests: write

jobs:
  # ============================================================
  # STAGE 1: Build & Unit Test
  # ============================================================

  backend-build:
    name: "1a. Backend - Build & Test"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: smart_doc_chatbot_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build & test
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/smart_doc_chatbot_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
        run: mvn clean verify -B

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/smart-doc-chatbot-1.0.0.jar
          retention-days: 5

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/
          retention-days: 5

  frontend-build:
    name: "1b. Frontend - Build & Test"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: frontend
        run: npm ci || npm install

      - name: Lint
        working-directory: frontend
        run: npx eslint src/ --ext .js,.jsx --max-warnings 0 || true

      - name: Test
        working-directory: frontend
        run: npm test -- --watchAll=false --passWithNoTests --coverage
        env:
          CI: true

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          REACT_APP_API_URL: /api
          REACT_APP_WS_URL: /ws

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 5

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 5

  # ============================================================
  # STAGE 2: SonarCloud Code Quality Analysis
  # ============================================================

  sonarcloud-backend:
    name: "2a. SonarCloud - Backend"
    runs-on: ubuntu-latest
    needs: backend-build
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: smart_doc_chatbot_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and generate coverage
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/smart_doc_chatbot_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
        run: mvn clean verify -B

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: SonarCloud scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectBaseDir: backend
          args: >
            -Dsonar.projectKey=imtarget05_Smart-Document-Chatbot
            -Dsonar.projectName="Smart Document Chatbot"
            -Dsonar.organization=imtarget05
            -Dsonar.sources=src/main/java
            -Dsonar.tests=src/test/java
            -Dsonar.java.binaries=target/classes
            -Dsonar.java.test.binaries=target/test-classes
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

  sonarcloud-frontend:
    name: "2b. SonarCloud - Frontend"
    runs-on: ubuntu-latest
    needs: frontend-build
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage

      - name: SonarCloud scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectBaseDir: frontend
          args: >
            -Dsonar.projectKey=imtarget05_Smart-Document-Chatbot-frontend
            -Dsonar.projectName="Smart Document Chatbot - Frontend"
            -Dsonar.organization=imtarget05
            -Dsonar.sources=src
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info

  # ============================================================
  # STAGE 3: Build Docker Images
  # ============================================================

  docker-build:
    name: "3. Build Docker Images"
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    outputs:
      backend-image: ${{ steps.meta-backend.outputs.tags }}
      frontend-image: ${{ steps.meta-frontend.outputs.tags }}
      image-tag: ${{ steps.vars.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate lowercase image names
        id: image-names
        run: |
          BACKEND_IMAGE="${{ github.repository }}/backend"
          FRONTEND_IMAGE="${{ github.repository }}/frontend"
          echo "backend=$(echo $BACKEND_IMAGE | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "frontend=$(echo $FRONTEND_IMAGE | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set image tag
        id: vars
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "tag=pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata - Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image-names.outputs.backend }}
          tags: |
            type=sha,prefix=
            type=ref,event=pr
            type=raw,value=${{ steps.vars.outputs.tag }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker metadata - Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image-names.outputs.frontend }}
          tags: |
            type=sha,prefix=
            type=ref,event=pr
            type=raw,value=${{ steps.vars.outputs.tag }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            REACT_APP_API_URL=/api
            REACT_APP_WS_URL=/ws
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # STAGE 4: Trivy Security Scan (Image-level)
  # ============================================================

  trivy-scan-backend:
    name: "4a. Trivy - Backend Image"
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Generate lowercase backend image name
        id: image-name
        run: |
          BACKEND_IMAGE="${{ github.repository }}/backend"
          echo "backend=$(echo $BACKEND_IMAGE | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Run Trivy on backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ steps.image-name.outputs.backend }}:${{ needs.docker-build.outputs.image-tag }}'
          format: 'sarif'
          output: 'trivy-backend.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Trivy SARIF (backend)
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-backend.sarif'
          category: 'trivy-backend'

      - name: Trivy table output (backend)
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ steps.image-name.outputs.backend }}:${{ needs.docker-build.outputs.image-tag }}'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: true
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  trivy-scan-frontend:
    name: "4b. Trivy - Frontend Image"
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Generate lowercase frontend image name
        id: image-name
        run: |
          FRONTEND_IMAGE="${{ github.repository }}/frontend"
          echo "frontend=$(echo $FRONTEND_IMAGE | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Run Trivy on frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ steps.image-name.outputs.frontend }}:${{ needs.docker-build.outputs.image-tag }}'
          format: 'sarif'
          output: 'trivy-frontend.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Trivy SARIF (frontend)
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-frontend.sarif'
          category: 'trivy-frontend'

      - name: Trivy table output (frontend)
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ steps.image-name.outputs.frontend }}:${{ needs.docker-build.outputs.image-tag }}'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: true
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  trivy-scan-iac:
    name: "4c. Trivy - IaC & Config Scan"
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trivy config scan (Dockerfiles, K8s manifests)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-iac.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload IaC SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-iac.sarif'
          category: 'trivy-iac'

  # ============================================================
  # STAGE 5: Gate - All checks must pass
  # ============================================================

  ci-gate:
    name: "5. CI Quality Gate"
    runs-on: ubuntu-latest
    needs:
      - backend-build
      - frontend-build
      - docker-build
      - trivy-scan-backend
      - trivy-scan-frontend
      - trivy-scan-iac
    if: always()
    steps:
      - name: Check all stages passed
        run: |
          echo "=== CI Quality Gate ==="
          echo "Backend build:     ${{ needs.backend-build.result }}"
          echo "Frontend build:    ${{ needs.frontend-build.result }}"
          echo "Docker build:      ${{ needs.docker-build.result }}"
          echo "Trivy backend:     ${{ needs.trivy-scan-backend.result }}"
          echo "Trivy frontend:    ${{ needs.trivy-scan-frontend.result }}"
          echo "Trivy IaC:         ${{ needs.trivy-scan-iac.result }}"

          if [[ "${{ needs.backend-build.result }}" != "success" ]] || \
             [[ "${{ needs.frontend-build.result }}" != "success" ]] || \
             [[ "${{ needs.docker-build.result }}" != "success" ]]; then
            echo "::error::Critical CI stages failed!"
            exit 1
          fi

          if [[ "${{ needs.trivy-scan-backend.result }}" == "failure" ]] || \
             [[ "${{ needs.trivy-scan-frontend.result }}" == "failure" ]]; then
            echo "::warning::Trivy detected CRITICAL/HIGH vulnerabilities. Review required."
          fi

          echo "CI Quality Gate: PASSED"
