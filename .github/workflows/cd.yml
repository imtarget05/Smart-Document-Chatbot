# ============================================
# CD Pipeline - GitOps Deployment via Argo CD
# Triggers: push to main (staging), version tags (production)
#
# Flow: CI passes -> Update K8s image tags -> Argo CD detects -> Syncs to cluster
# ============================================

name: CD Pipeline

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: 'Image tag to deploy (default: latest commit SHA)'
        required: false

env:
  REGISTRY: ghcr.io

permissions:
  contents: write
  packages: write

jobs:
  # ============================================================
  # STAGE 1: Build & Push Vetted Images
  # ============================================================

  build-and-push:
    name: "1. Build & Push Vetted Images"
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    outputs:
      image-tag: ${{ steps.tag.outputs.value }}
      backend-image: ${{ steps.image-names.outputs.backend }}
      frontend-image: ${{ steps.image-names.outputs.frontend }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate lowercase image names
        id: image-names
        run: |
          BACKEND_IMAGE="${{ github.repository }}/backend"
          FRONTEND_IMAGE="${{ github.repository }}/frontend"
          echo "backend=$(echo $BACKEND_IMAGE | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "frontend=$(echo $FRONTEND_IMAGE | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Determine image tag
        id: tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "value=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image-names.outputs.backend }}:${{ steps.tag.outputs.value }}
            ${{ env.REGISTRY }}/${{ steps.image-names.outputs.backend }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image-names.outputs.frontend }}:${{ steps.tag.outputs.value }}
            ${{ env.REGISTRY }}/${{ steps.image-names.outputs.frontend }}:latest
          build-args: |
            REACT_APP_API_URL=/api
            REACT_APP_WS_URL=/ws
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # STAGE 2: Update Kubernetes Manifests (GitOps trigger)
  # ============================================================

  deploy-staging:
    name: "2. Deploy to Staging (GitOps)"
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update staging image tags
        run: |
          TAG="${{ needs.build-and-push.outputs.image-tag }}"
          echo "Updating staging overlay to image tag: ${TAG}"

          cd k8s/overlays/staging

          # Update kustomization.yml image tags using sed
          sed -i "s|newTag: .*|newTag: ${TAG}|g" kustomization.yml

          echo "Updated kustomization.yml:"
          cat kustomization.yml

      - name: Commit and push manifest changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add k8s/overlays/staging/kustomization.yml
          git diff --staged --quiet && echo "No changes to commit" && exit 0

          git commit -m "chore(deploy): update staging images to ${{ needs.build-and-push.outputs.image-tag }}

          Triggered by: ${{ github.event.head_commit.message }}
          Commit: ${{ github.sha }}
          Author: ${{ github.actor }}"

          git push origin main

      - name: Wait for Argo CD sync
        run: |
          echo "Argo CD will detect the manifest change and sync automatically."
          echo "Staging image tag: ${{ needs.build-and-push.outputs.image-tag }}"
          echo ""
          echo "Monitor sync status:"
          echo "  argocd app get smart-doc-chatbot-staging"
          echo "  argocd app wait smart-doc-chatbot-staging --health --timeout 300"

      - name: Notify staging deployment
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": ":rocket: Staging deploy triggered\nImage: `${{ needs.build-and-push.outputs.image-tag }}`\nStatus: `${{ job.status }}`\nActor: `${{ github.actor }}`"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

  deploy-production:
    name: "3. Deploy to Production (GitOps)"
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Update production image tags
        run: |
          TAG="${{ needs.build-and-push.outputs.image-tag }}"
          echo "Updating production overlay to image tag: ${TAG}"

          cd k8s/overlays/production
          sed -i "s|newTag: .*|newTag: ${TAG}|g" kustomization.yml

          echo "Updated kustomization.yml:"
          cat kustomization.yml

      - name: Commit and push manifest changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add k8s/overlays/production/kustomization.yml
          git diff --staged --quiet && echo "No changes to commit" && exit 0

          git commit -m "chore(deploy): update production images to ${{ needs.build-and-push.outputs.image-tag }}

          Release: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Author: ${{ github.actor }}"

          git push origin main

      - name: Notify production deployment
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": ":warning: Production deploy triggered\nRelease: `${{ github.ref_name }}`\nImage: `${{ needs.build-and-push.outputs.image-tag }}`\nStatus: `${{ job.status }}`\n\n*Manual Argo CD sync required for production.*"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true

  # ============================================================
  # STAGE 4: Manual Deployment (workflow_dispatch)
  # ============================================================

  manual-deploy:
    name: "Manual Deploy"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tag
        id: tag
        run: |
          if [[ -n "${{ github.event.inputs.image_tag }}" ]]; then
            echo "value=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Update image tags
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          ENV="${{ github.event.inputs.environment }}"
          echo "Manual deploy: ${ENV} -> ${TAG}"

          cd k8s/overlays/${ENV}
          sed -i "s|newTag: .*|newTag: ${TAG}|g" kustomization.yml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          ENV="${{ github.event.inputs.environment }}"
          git add k8s/overlays/${ENV}/kustomization.yml
          git diff --staged --quiet && echo "No changes" && exit 0

          git commit -m "chore(deploy): manual ${ENV} deploy to ${{ steps.tag.outputs.value }}

          Triggered by: ${{ github.actor }}
          Environment: ${ENV}"

          git push origin main
